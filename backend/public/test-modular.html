<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modular Admin Dashboard Test</title>
    <meta name="csrf-token" content="test-token">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>
    <div class="container mt-4">
        <h1>Modular Admin Dashboard Test</h1>
        <div id="test-results" class="alert alert-info">
            <h5>Module Loading Test</h5>
            <div id="loading-status">Loading modules...</div>
        </div>
        
        <div class="row mt-4">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5>Map Test</h5>
                    </div>
                    <div class="card-body">
                        <div id="logisticsMap" style="height: 300px;"></div>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5>Search Test</h5>
                    </div>
                    <div class="card-body">
                        <div class="input-group mb-3">
                            <input type="text" id="map-address-search" class="form-control" placeholder="Search address...">
                            <button class="btn btn-primary" onclick="searchMapAddress()">Search</button>
                        </div>
                        <div id="search-result-display" style="display: none;">
                            <div class="alert alert-success">
                                <div id="result-address-text"></div>
                                <div id="result-coords-text"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast container -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3"></div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Test data -->
    <script>
        // Mock data for testing
        window.BRANCHES = [
            {
                id: 1,
                name: "Main Branch",
                latitude: 9.3068,
                longitude: 123.3054,
                address: "Dumaguete City, Negros Oriental",
                phone: "+63 123 456 7890"
            }
        ];
        
        window.PENDING_PICKUPS = [
            {
                id: 1,
                customer: { name: "Test Customer" },
                pickup_address: "Test Address, Dumaguete",
                latitude: 9.3100,
                longitude: 123.3100,
                status: "pending",
                created_at: new Date().toISOString()
            }
        ];
        
        window.DASHBOARD_STATS = {
            todayLaundries: 5,
            todayRevenue: 1500,
            activeCustomers: 25,
            unclaimedLaundry: 2
        };
        
        // Test module loading
        window.addEventListener('load', () => {
            const statusDiv = document.getElementById('loading-status');
            
            setTimeout(() => {
                if (window.dashboard && window.dashboard.initialized) {
                    statusDiv.innerHTML = `
                        <div class="text-success">
                            <i class="bi bi-check-circle"></i> 
                            Modular dashboard loaded successfully!
                        </div>
                        <small class="text-muted">
                            Dashboard instance: ${typeof window.dashboard}<br>
                            Modules loaded: ${Object.keys(window.dashboard.modules || {}).length}
                        </small>
                    `;
                } else {
                    statusDiv.innerHTML = `
                        <div class="text-danger">
                            <i class="bi bi-x-circle"></i> 
                            Failed to load modular dashboard
                        </div>
                        <small class="text-muted">
                            Check browser console for errors
                        </small>
                    `;
                }
            }, 2000);
        });
    </script>
    
    <!-- Load the modular admin dashboard -->
    <script type="module" src="assets/js/admin.js"></script>
</body>
</html>
